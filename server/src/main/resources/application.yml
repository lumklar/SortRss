server:
  port: 80
spring:
  application:
    name: server
  profiles:
    active: dev
  jpa:
    generate-ddl: false
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  threads:
    virtual:
      enabled: true
logging:
  file:
    path: ./logs
  charset:
    console: UTF-8
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
api:
  response:
    exclude-extra: false
# 自定义应用配置
app:
  database:
    sqlite:
      # 默认路径：当前目录下的 data/rss.db
      # 用户可以通过环境变量 SQLITE_DB_PATH 覆盖此值
      path: ${SQLITE_DB_PATH:./data/rss.db}

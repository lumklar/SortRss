name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]       # main 分支推送时触发
  workflow_dispatch:         # 允许手动在 Actions 页面触发

# 关键权限：允许 GitHub Token 向 gh-pages 分支推送代码
permissions:
  contents: write
  pages: write
  id-token: write

# 并发控制，防止页面被覆盖
concurrency:
  group: "page"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. 设置 JDK（Gradle 运行环境）
      # ------------------------------------------------------------
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ------------------------------------------------------------
      # 2. 配置 Gradle（自动开启缓存，加速构建）
      # ------------------------------------------------------------
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x gradlew

      # ------------------------------------------------------------
      # 3. （新增）设置 Python 环境，并缓存 pip 依赖
      # ------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'      # 可自行调整版本
          cache: 'pip'                # 自动缓存 ~/.cache/pip

      # ------------------------------------------------------------
      # 4. 执行编译任务，并注入环境变量 FLAVOR_DATA=mock
      # ------------------------------------------------------------
      - name: Build WASM JS distribution
        run: ./gradlew :home:prepareDistribution
        env:
          FLAVOR_DATA: mock   # 这里注入，Gradle 中可通过 System.getenv("FLAVOR_DATA") 读取

      # ------------------------------------------------------------
      # 5. 部署到 GitHub Pages（gh-pages 分支）
      #    产物路径: home/build/dist
      # ------------------------------------------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./home/build/dist
          publish_branch: gh-pages    # 目标分支，GitHub Pages 默认读取这个分支
          force_orphan: true          # 强制清空历史记录，保持分支干净（推荐）
          # 可选：保留已部署文件的版本历史，如果想保留，设为 false
          # keep_files: false
name: Build and Push Docker Image

on:
  push:
    branches: [ dev ]       # dev 分支推送时触发
  workflow_dispatch:         # 允许手动在 Actions 页面触发

permissions:
  contents: read
  packages: write          # 推送到 ghcr.io 必需

concurrency:
  group: "docker-dev"
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. 安装所有需要的 JDK，供 Gradle Toolchain 自动识别
      #    Gradle 会扫描这些安装路径
      # ------------------------------------------------------------
      - name: Set up JDK 25 (用于 toolchain 编译)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'        # Temurin 可能暂无 25，Oracle 提供早期版本
        continue-on-error: true         # 若安装失败，Gradle 会自动下载，不影响构建

      - name: Set up JDK 21 (用于运行 Gradle 守护进程)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ------------------------------------------------------------
      # 2. 登录 ghcr.io（使用 GITHUB_TOKEN）
      # ------------------------------------------------------------
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------
      # 3. 设置 Docker Buildx 和 QEMU（多平台构建必需）
      # ------------------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------
      # 4. 执行 Gradle 任务（带多平台环境变量）
      # ------------------------------------------------------------
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build and Push Docker Images
        run: ./gradlew pushDockerImage-jvm-wasmJs-network
        env:
          DOCKER_IMAGE_VERSION: nightly   # 指定需要构建的镜像版本名称
          # 如果不需要多平台，注释或删除此行即可回退到单架构

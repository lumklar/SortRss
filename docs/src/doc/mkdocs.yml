site_name: docs

# Meta tags (placed in header)
site_description: "Sort-Rss multi-module project"
site_author: Lumklar
#TODO 动态配置路径
site_url: https://lumklar.github.io/SortRss/docs/

# Repository (add link to repository on each page)
repo_name: SortRss
repo_url: https://github.com/lumklar/SortRss
edit_uri: edit/dev/docs/src/doc/docs

#Copyright (shown at the footer)
#copyright: 'Copyright &copy; 2017 Your Name'

# Meterial theme
theme:
  name: 'material'
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    #- navigation.tabs
    #- navigation.tabs.sticky
    #- navigation.instant
    - navigation.tracking
    - navigation.top
    - content.action.edit

#plugins:
#  - search
#    Required for variables support (https://github.com/rosscdh/mkdocs-markdownextradata-plugin)
#  - markdownextradata
#  - mkdocs-static-i18n:
#      default_language: zh

